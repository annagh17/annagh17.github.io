

<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <title>Poeta IA - Transformers.js</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; text-align: center; padding: 50px; background: #eef2f3; }
    .caixa { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: inline-block; max-width: 500px; width: 100%; }
    input { padding: 15px; width: 80%; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; transition: border 0.3s; }
    input:focus { border-color: #667eea; outline: none; }
    button { padding: 15px 30px; margin-top: 15px; cursor: pointer; background: #667eea; color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    
    #status { margin-top: 10px; font-size: 0.8rem; color: #888; }
    #resposta { margin-top: 30px; font-size: 1.4rem; color: #2d3436; font-style: italic; min-height: 1.6em; line-height: 1.4; }
    
    /* El teu div d'errors */
    #error-div { 
      margin-top: 20px; padding: 15px; background: #fff0f0; color: #d63031; 
      border-left: 5px solid #d63031; border-radius: 5px; display: none; text-align: left;
    }
  </style>
</head>
<body>

  <div class="caixa">
    <h1>Poeta IA <small style="font-size: 0.5em; vertical-align: middle;">🤖</small></h1>
    <p>La IA que entén el català real.</p>
    
    <input type="text" id="text" placeholder="Com et sents realment?">
    <br>
    <button id="btn" onclick="analitza()" disabled>Carregant cervell...</button>
    
    <div id="status">Descarregant model d'IA (només la primera vegada)...</div>
    <div id="resposta"></div>
    <div id="error-div"></div>
  </div>

  <script type="module">
    // Importem la llibreria directament com a mòdul
    import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';

    let pipe;
    const btn = document.getElementById('btn');
    const status = document.getElementById('status');
    const errorDiv = document.getElementById('error-div');

    // Inicialitzem el model (Multilingual)
    async function init() {
      try {
        // Aquest model és boníssim per a sentiments i és multilingüe (entén català perfecte)
        pipe = await pipeline('sentiment-analysis', 'Xenova/distilbert-base-multilingual-cased-sentiments-student');
        
        btn.disabled = false;
        btn.innerText = "Inspirar-me";
        status.innerText = "IA a punt per escoltar-te";
      } catch (err) {
        mostraError("No s'ha pogut carregar el model: " + err.message);
      }
    }

    window.analitza = async function() {
      const input = document.getElementById('text');
      const resp = document.getElementById('resposta');
      
      netejaError();
      if (!input.value.trim()) {
        mostraError("Escriu alguna cosa! La IA no pot llegir el buit.");
        return;
      }

      resp.innerText = "Pensant...";
      btn.disabled = true;

      try {
        const result = await pipe(input.value);
        // result és un array: [{label: '5 stars', score: 0.99}]
        // Els models multilingües solen tornar estrelles o POSITIVE/NEGATIVE
        const sentiment = result[0].label; 
        const score = result[0].score;

        let tipus = "neutre";
        // Lògica per a aquest model concret (1-2 estrelles = negatiu, 3 = neutre, 4-5 = positiu)
        if (sentiment.includes('1') || sentiment.includes('2')) tipus = "negatiu";
        else if (sentiment.includes('4') || sentiment.includes('5')) tipus = "positiu";
        else if (sentiment.includes('POSITIVE')) tipus = "positiu";
        else if (sentiment.includes('NEGATIVE')) tipus = "negatiu";

        const frases = {
          positiu: ["La llum dins teu floreix com un matí infinit.", "El teu cor canta amb veu d’estrelles."],
          negatiu: ["La tristesa és una ombra que també sap abraçar.", "En la foscor, el teu cor aprèn a resistir."],
          neutre: ["Ets un instant suspès entre somni i realitat.", "El silenci dins teu té forma d’univers."]
        };

        const llista = frases[tipus];
        resp.innerText = llista[Math.floor(Math.random() * llista.length)];

      } catch (err) {
        mostraError("Error en l'anàlisi: " + err.message);
      } finally {
        btn.disabled = false;
      }
    }

    function mostraError(msg) {
      errorDiv.innerText = "⚠️ " + msg;
      errorDiv.style.display = "block";
      document.getElementById('resposta').innerText = "";
    }

    function netejaError() {
      errorDiv.style.display = "none";
    }

    // Arrancada
    init();
  </script>
</body>
</html>
